<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الكتب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0a0a1a; color: #e8e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
       
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 18px 32px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 40px;
        }
       
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #f7d794, #f5a97f, #c39bd3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
       
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 6px 20px;
            flex: 1 1 300px;
        }
       
        .search-box input {
            background: transparent;
            border: none;
            padding: 14px 12px;
            width: 100%;
            font-size: 16px;
            color: #fff;
            outline: none;
            font-family: 'Cairo', sans-serif;
        }
       
        .search-box input::placeholder { color: #7a7a9a; }
        .search-box button {
            background: none;
            border: none;
            color: #9a9abf;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }
        .search-box button:hover { color: #c39bd3; }
       
        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }
       
        .filter-tag {
            padding: 8px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #9a9abf;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
       
        .filter-tag:hover,
        .filter-tag.active {
            background: rgba(195, 155, 211, 0.15);
            color: #fff;
            border-color: rgba(195, 155, 211, 0.3);
        }
       
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 28px;
        }
       
        .book-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 22px 20px 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.35s ease;
            display: flex;
            flex-direction: column;
        }
       
        .book-card:hover {
            transform: translateY(-8px);
            border-color: rgba(195, 155, 211, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            background: rgba(255, 255, 255, 0.05);
        }
       
        .book-cover {
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            background: linear-gradient(145deg, rgba(195, 155, 211, 0.08), rgba(245, 169, 127, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
        }
       
        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }
       
        .book-cover .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(195, 155, 211, 0.2);
            backdrop-filter: blur(8px);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            color: #c39bd3;
            border: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 2;
        }
       
        .book-cover .book-icon { font-size: 56px; color: #c39bd3; opacity: 0.6; }
        .book-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .book-author { font-size: 14px; color: #9a9abf; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
       
        .book-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #7a7a9a;
            margin: 10px 0 14px;
            padding: 8px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-wrap: wrap;
            gap: 5px;
        }
       
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
       
        .btn-download {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-family: 'Cairo', sans-serif;
        }
       
        .btn-download:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            box-shadow: 0 12px 40px -8px rgba(139, 92, 246, 0.5);
        }
       
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            margin-bottom: 30px;
        }
       
        .stats-bar .stat { text-align: center; }
        .stats-bar .stat .number { font-size: 28px; font-weight: 800; color: #c39bd3; }
        .stats-bar .stat .label { font-size: 14px; color: #7a7a9a; }
       
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 34px;
            border-radius: 60px;
            border: 1px solid rgba(195, 155, 211, 0.15);
            color: #e8e8f0;
            font-weight: 600;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 16px;
            opacity: 0;
            visibility: hidden;
            font-family: 'Cairo', sans-serif;
        }
       
        .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .toast i { font-size: 24px; color: #c39bd3; }
       
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #7a7a9a;
            font-size: 20px;
            grid-column: 1 / -1;
        }
       
        .no-results i { font-size: 60px; color: #3a3a5a; margin-bottom: 20px; display: block; }
       
        @media (max-width: 820px) {
            .header { flex-direction: column; align-items: stretch; border-radius: 30px; padding: 18px 20px; }
            .logo { text-align: center; }
            .books-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 18px; }
        }
       
        @media (max-width: 480px) {
            .books-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
            .book-card { padding: 16px 14px 18px; border-radius: 20px; }
            .book-title { font-size: 15px; }
            .btn-download { font-size: 12px; padding: 10px 14px; }
            .stats-bar { gap: 20px; }
            .stats-bar .stat .number { font-size: 20px; }
            .filter-tags { gap: 6px; }
            .filter-tag { font-size: 12px; padding: 5px 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo">📚 مكتبة الكتب</div>
        <div class="search-box">
            <input type="text" placeholder="ابحث عن كتاب أو مؤلف..." id="searchInput">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <div class="stats-bar">

        <div class="stat"><div class="number" id="authorCount">0</div><div class="label">✍️ مؤلفين</div></div>
        <div class="stat"><div class="number">مجاناً</div><div class="label">💫 تحميل مباشر</div></div>
    </div>

    <div class="filter-tags" id="filterTags">

        <span class="filter-tag" data-filter="أسامة المسلم">🖋️ أسامة المسلم</span>
        <span class="filter-tag" data-filter="نجيب محفوظ">🏆 نجيب محفوظ</span>

        <span class="filter-tag" data-filter="جبران خليل جبران">🌹 جبران</span>
        <span class="filter-tag" data-filter="عالمية">🌍 عالمية</span>

        <span class="filter-tag" data-filter="عمرو عبد الحميد">📖 عمرو عبد الحميد</span>
    </div>

    <div class="books-grid" id="booksGrid"></div>
</div>

<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">جاري التحميل...</span>
</div>

        // ================================================================
        //  عرض الكتب
        // ================================================================

        const booksGrid = document.getElementById('booksGrid');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const filterTags = document.querySelectorAll('.filter-tag');

        let currentFilter = 'all';
        let currentSearch = '';

        function getUniqueAuthors() {
            const authors = new Set(allBooks.map(b => b.author));
            return authors.size;
        }

        document.getElementById('bookCount').textContent = allBooks.length;
        document.getElementById('authorCount').textContent = getUniqueAuthors();

        function renderBooks() {
            const filtered = allBooks.filter(book => {
                if (currentFilter !== 'all') {
                    if (currentFilter === 'عالمية') {
                        const worldAuthors = ['جورج أورويل', 'فيودور دوستويفسكي', 'فيكتور هوغو', 'غابرييل غارسيا ماركيز',
                            'نيكولو مكيافيلي', 'ألبير كامو', 'جين أوستن', 'تشارلز ديكنز', 'شارلوت برونتي',
                            'إيميلي برونتي', 'ماري شيلي', 'برام ستوكر', 'هرمان ملفيل', 'روبرت لويس ستيفنسون',
                            'فرانز كافكا', 'هوميروس'];
                        if (!worldAuthors.includes(book.author)) return false;
                    } else if (book.author !== currentFilter) {
                        return false;
                    }
                }

                if (currentSearch) {
                    const search = currentSearch.toLowerCase();
                    const matchTitle = book.title.toLowerCase().includes(search);
                    const matchAuthor = book.author.toLowerCase().includes(search);
                    const matchCategory = book.category.toLowerCase().includes(search);
                    if (!matchTitle && !matchAuthor && !matchCategory) return false;
                }

                return true;
            });

            booksGrid.innerHTML = '';

            if (filtered.length === 0) {
                booksGrid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-book-open"></i>
                        <p>😅 لا توجد نتائج مطابقة</p>
                        <p style="font-size: 16px; color: #5a5a7a;">حاول تغيير البحث أو التصفية</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';

                const cover = document.createElement('div');
                cover.className = 'book-cover';

                if (book.badge) {
                    const badge = document.createElement('span');
                    badge.className = 'badge';
                    badge.textContent = book.badge;
                    cover.appendChild(badge);
                }

                // عرض صورة الغلاف إذا كانت موجودة
                if (book.cover && book.cover !== 'https://example.com/covers/') {
                    const img = document.createElement('img');
                    img.src = book.cover;
                    img.alt = book.title;
                    img.onerror = function() {
                        // إذا فشل تحميل الصورة، استخدم الأيقونة
                        this.style.display = 'none';
                        const icon = document.createElement('i');
                        icon.className = `fas ${book.icon || 'fa-book'} book-icon`;
                        cover.appendChild(icon);
                    };
                    cover.appendChild(img);
                } else {
                    const icon = document.createElement('i');
                    icon.className = `fas ${book.icon || 'fa-book'} book-icon`;
                    cover.appendChild(icon);
                }

                card.appendChild(cover);

                const title = document.createElement('div');
                title.className = 'book-title';
                title.textContent = book.title;
                card.appendChild(title);

                const author = document.createElement('div');
                author.className = 'book-author';
                author.innerHTML = `<i class="fas fa-pen-fancy"></i> ${book.author}`;
                card.appendChild(author);

                const meta = document.createElement('div');
                meta.className = 'book-meta';
                meta.innerHTML = `
                    <span><i class="fas fa-tag"></i> ${book.category}</span>
                    <span><i class="fas fa-file-pdf"></i> ${book.pages} صفحة</span>
                `;
                card.appendChild(meta);

                const btnGroup = document.createElement('div');
                btnGroup.className = 'btn-group';

                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'btn-download';
                downloadBtn.innerHTML = `<i class="fas fa-download"></i> تحميل PDF`;
                downloadBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    if (book.downloadLink && book.downloadLink !== 'https://example.com/book.pdf') {
                        const win = window.open(book.downloadLink, '_blank');
                        if (!win) window.location.href = book.downloadLink;
                        showToast(`✅ جاري تحميل "${book.title}" ...`);
                    } else {
                        showToast(`❌ رابط التحميل غير متوفر لهذا الكتاب`);
                    }
                });
                btnGroup.appendChild(downloadBtn);

                card.appendChild(btnGroup);
                booksGrid.appendChild(card);
            });
        }

        filterTags.forEach(tag => {
            tag.addEventListener('click', function() {
                filterTags.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderBooks();
            });
        });

        searchBtn.addEventListener('click', function() {
            currentSearch = searchInput.value.trim();
            renderBooks();
        });

        searchInput.addEventListener('keyup', function(e) {
            if (e.key === 'Enter') {
                currentSearch = this.value.trim();
                renderBooks();
            }
        });

        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        let toastTimeout = null;

        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.add('show');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        renderBooks();

        setTimeout(() => {
            showToast(`📚 مرحباً! ${allBooks.length} كتاباً بانتظارك`);
        }, 500);

    })();
</script>
